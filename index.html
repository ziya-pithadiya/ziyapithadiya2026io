<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="hero">
      <h1>My GitHub Repositories</h1>
      <p>
        This page loads every public repository from your GitHub account.
        Update <code>GITHUB_USERNAME</code> in the script below.
      </p>
    </header>

    <main>
      <section class="toolbar" aria-label="Repository controls">
        <label for="sort-select">Sort by:</label>
        <select id="sort-select">
          <option value="updated">Recently Updated</option>
          <option value="stars">Most Stars</option>
          <option value="name">Name (A-Z)</option>
        </select>
      </section>

      <section aria-live="polite">
        <p id="status" class="status">Loading repositories…</p>
        <div id="repo-grid" class="repo-grid"></div>
      </section>
    </main>

    <template id="repo-card-template">
      <article class="repo-card">
        <div class="repo-head">
          <h2 class="repo-name"></h2>
          <span class="repo-visibility"></span>
        </div>
        <p class="repo-description"></p>
        <ul class="repo-meta">
          <li class="repo-language"></li>
          <li class="repo-stars"></li>
          <li class="repo-updated"></li>
        </ul>
        <a class="repo-link" target="_blank" rel="noopener noreferrer">View Repository</a>
      </article>
    </template>

    <script>
      const GITHUB_USERNAME = "YOUR_GITHUB_USERNAME";
      const statusEl = document.getElementById("status");
      const repoGrid = document.getElementById("repo-grid");
      const sortSelect = document.getElementById("sort-select");
      const repoTemplate = document.getElementById("repo-card-template");

      let repos = [];

      function formatDate(dateString) {
        const date = new Date(dateString);
        return new Intl.DateTimeFormat("en-US", {
          month: "short",
          day: "numeric",
          year: "numeric"
        }).format(date);
      }

      function sortRepos(items, sortBy) {
        const copy = [...items];

        if (sortBy === "stars") {
          return copy.sort((a, b) => b.stargazers_count - a.stargazers_count);
        }

        if (sortBy === "name") {
          return copy.sort((a, b) => a.name.localeCompare(b.name));
        }

        return copy.sort((a, b) => new Date(b.updated_at) - new Date(a.updated_at));
      }

      function renderRepos(items) {
        repoGrid.innerHTML = "";

        if (items.length === 0) {
          statusEl.textContent = "No repositories found.";
          return;
        }

        const fragment = document.createDocumentFragment();

        items.forEach((repo) => {
          const node = repoTemplate.content.cloneNode(true);
          node.querySelector(".repo-name").textContent = repo.name;
          node.querySelector(".repo-visibility").textContent = repo.private ? "Private" : "Public";
          node.querySelector(".repo-description").textContent =
            repo.description || "No description provided.";
          node.querySelector(".repo-language").textContent = `Language: ${repo.language || "N/A"}`;
          node.querySelector(".repo-stars").textContent = `★ ${repo.stargazers_count}`;
          node.querySelector(".repo-updated").textContent = `Updated: ${formatDate(repo.updated_at)}`;

          const link = node.querySelector(".repo-link");
          link.href = repo.html_url;
          link.textContent = "Open on GitHub";

          fragment.appendChild(node);
        });

        repoGrid.appendChild(fragment);
        statusEl.textContent = `Loaded ${items.length} repositories.`;
      }

      async function fetchRepos() {
        if (!GITHUB_USERNAME || GITHUB_USERNAME === "YOUR_GITHUB_USERNAME") {
          statusEl.textContent = "Set your GitHub username in GITHUB_USERNAME to load repos.";
          return;
        }

        try {
          statusEl.textContent = "Loading repositories…";
          const response = await fetch(
            `https://api.github.com/users/${GITHUB_USERNAME}/repos?per_page=100&type=owner`
          );

          if (!response.ok) {
            throw new Error(`GitHub API error: ${response.status}`);
          }

          repos = await response.json();
          renderRepos(sortRepos(repos, sortSelect.value));
        } catch (error) {
          statusEl.textContent = "Could not load repositories. Check username or API limits.";
          console.error(error);
        }
      }

      sortSelect.addEventListener("change", () => {
        renderRepos(sortRepos(repos, sortSelect.value));
      });

      fetchRepos();
    </script>
  </body>
</html>
